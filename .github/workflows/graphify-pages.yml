name: graphify-pages

# Publish the code knowledge graph to GitHub Pages on every push that affects
# src/. Original graphify force-directed layout (live, unchanged) + deterministic
# file/symbol-based community names. No LLM / API key needed.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/graphify/**'
      - '.github/workflows/graphify-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: graphify-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install graphify
        run: pip install graphifyy
      - name: Build AST code graph
        run: python scripts/graphify/graphify_ast_build.py src
      - name: Name communities (deterministic, file/symbol-based, no LLM)
        run: python scripts/graphify/graphify_autolabel.py src
      - name: Export interactive HTML (default graphify layout)
        working-directory: src
        run: graphify export html
      - name: Assemble site
        run: |
          mkdir -p _site
          cp src/graphify-out/graph.html _site/index.html
          cp src/graphify-out/GRAPH_REPORT.md _site/GRAPH_REPORT.md || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
