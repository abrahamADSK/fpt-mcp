<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPT-MCP Console</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
  }
  .header {
    background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #0f3460;
  }
  .header h1 { font-size: 16px; font-weight: 600; color: #e94560; }
  .header .context-badge {
    background: #0f3460; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #94a3b8;
  }
  .header .context-badge.active { background: #164e63; color: #67e8f9; }
  .header .status { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
  .header .status.connected { background: #22c55e; }

  .chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #0f3460; color: #e0e0e0; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #1e293b; color: #cbd5e1; border-bottom-left-radius: 4px; white-space: pre-wrap; }
  .msg.error { align-self: flex-start; background: #7f1d1d; color: #fca5a5; }
  .msg.thinking { align-self: flex-start; background: #1e293b; color: #64748b; font-style: italic; }

  .input-bar {
    background: #16213e; padding: 12px 20px; display: flex; gap: 10px;
    border-top: 1px solid #0f3460;
  }
  .input-bar input {
    flex: 1; background: #1e293b; border: 1px solid #334155; color: #e0e0e0;
    padding: 10px 14px; border-radius: 10px; font-size: 14px; outline: none;
  }
  .input-bar input:focus { border-color: #e94560; }
  .input-bar button {
    background: #e94560; border: none; color: white; padding: 10px 20px;
    border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  .input-bar button:hover { background: #c13550; }
  .input-bar button:disabled { background: #334155; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <h1>FPT-MCP Console</h1>
  <span class="context-badge" id="contextBadge">Sin contexto</span>
  <div class="status" id="statusDot"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <input type="text" id="input" placeholder="Escribe aquí..." autofocus>
  <button id="sendBtn" onclick="send()">Enviar</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const statusDot = document.getElementById('statusDot');
const contextBadge = document.getElementById('contextBadge');

const params = new URLSearchParams(window.location.search);
const ctx = {
  entity_type: params.get('entity_type'),
  entity_id: params.get('selected_ids') ? parseInt(params.get('selected_ids')) : null,
  project_id: params.get('project_id') ? parseInt(params.get('project_id')) : null,
  project_name: params.get('project_name'),
};
if (typeof AMI_CONTEXT !== 'undefined') {
  if (AMI_CONTEXT.entity_type) ctx.entity_type = AMI_CONTEXT.entity_type;
  if (AMI_CONTEXT.selected_ids) ctx.entity_id = parseInt(AMI_CONTEXT.selected_ids);
  if (AMI_CONTEXT.project_id) ctx.project_id = parseInt(AMI_CONTEXT.project_id);
  if (AMI_CONTEXT.project_name) ctx.project_name = AMI_CONTEXT.project_name;
}
if (ctx.entity_type && ctx.entity_id) {
  contextBadge.textContent = `${ctx.entity_type} #${ctx.entity_id}`;
  contextBadge.classList.add('active');
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  addMsg(text, 'user');
  const thinking = addMsg('Pensando...', 'thinking');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        context: (ctx.entity_type && ctx.entity_id) ? ctx : undefined,
      })
    });
    const data = await res.json();
    chat.removeChild(thinking);

    if (data.error) {
      addMsg(data.error, 'error');
    } else {
      addMsg(data.text, 'assistant');
    }
  } catch (e) {
    chat.removeChild(thinking);
    addMsg(`Error de conexión: ${e.message}`, 'error');
  }
  document.getElementById('sendBtn').disabled = false;
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

// Check connection
fetch('/health').then(r => r.json()).then(d => {
  if (d.status === 'ok') statusDot.classList.add('connected');
}).catch(() => {});
</script>
</body>
</html>
